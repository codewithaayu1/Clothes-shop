<script>
const supabaseUrl = "https://eeazlxdugmpjtvfkfqcj.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlYXpseGR1Z21wanR2ZmtmcWNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTgxNTIsImV4cCI6MjA4Nzk5NDE1Mn0.QSxwNNOd3PpSf_RURQz2SElAew9XXY6jA8p13B_Cjlo";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function loadProducts(){
const { data } = await supabase.from('products').select('*');
let container = document.getElementById("products");
container.innerHTML = "";

if(data){
data.forEach(p=>{
container.innerHTML += `
<div class="card">
<img src="${p.image}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<p>${p.category}</p>
</div>
`;
});
}
}
</script>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:black;color:white;text-align:center;padding:15px;font-size:22px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;padding:20px}
.card{background:white;padding:10px;border-radius:8px;box-shadow:0 0 5px rgba(0,0,0,0.1);text-align:center}
.card img{width:100%;height:180px;object-fit:cover}
