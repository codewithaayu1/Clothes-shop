<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://eeazlxdugmpjtvfkfqcj.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlYXpseGR1Z21wanR2ZmtmcWNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTgxNTIsImV4cCI6MjA4Nzk5NDE1Mn0.QSxwNNOd3PpSf_RURQz2SElAew9XXY6jA8p13B_Cjlo";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#f8f8f8;
}

header{
background:black;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

button{
background:black;
color:white;
padding:10px 15px;
border:none;
cursor:pointer;
margin-top:10px;
}

input, select{
width:100%;
padding:8px;
margin:5px 0;
}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-top:20px;
}

.product-card{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
text-align:center;
}

.product-card img{
width:100%;
height:180px;
object-fit:cover;
}
</style>
</head>

<body>

<header>
Aayu Brand - Ara, Bihar
</header>

<div class="container">

<h2>🛍️ Shop</h2>
<div id="productContainer" class="product-grid"></div>

<hr style="margin:40px 0;">

<h2>🔐 Admin Panel</h2>

<input type="password" id="adminPass" placeholder="Enter Admin Password">
<button onclick="checkAdmin()">Login</button>

<div id="adminSection" style="display:none;">

<h3>Add Product</h3>

<input type="text" id="pname" placeholder="Product Name">
<input type="number" id="pprice" placeholder="Price">
<input type="text" id="pimage" placeholder="Image URL">
<select id="pcategory">
<option value="Men">Men</option>
<option value="Women">Women</option>
<option value="Kids">Kids</option>
</select>

<button onclick="addProduct()">Add Product</button>

</div>

</div>

<script>

function checkAdmin(){
let pass = document.getElementById("adminPass").value;
if(pass === "Aayu@2024"){
document.getElementById("adminSection").style.display="block";
alert("Admin Access Granted");
}else{
alert("Wrong Password");
}
}

async function addProduct(){

let name = document.getElementById("pname").value;
let price = document.getElementById("pprice").value;
let image = document.getElementById("pimage").value;
let category = document.getElementById("pcategory").value;

if(!name || !price || !image){
alert("Fill all fields");
return;
}

const { error } = await supabase
.from('products')
.insert([{ name, price, image, category }]);

if(error){
alert("Error: " + error.message);
}else{
alert("Product Added Successfully");
loadProducts();
}
}

async function loadProducts(){

const { data, error } = await supabase
.from('products')
.select('*');

let container = document.getElementById("productContainer");
container.innerHTML="";

if(data){
data.forEach(product=>{
container.innerHTML += `
<div class="product-card">
<img src="${product.image}">
<h4>${product.name}</h4>
<p>₹${product.price}</p>
<p>${product.category}</p>
</div>
`;
});
}
}

loadProducts();

</script>

</body>
  </html>
